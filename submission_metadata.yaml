ai_usage_summary: |
  Used Gemini to discuss re-ranking heuristics, troubleshoot Windows PowerShell path issues, and clean up documentation. No candidate data was sent to any external LLMs during the execution.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  A hybrid retrieval and heuristic re-ranking pipeline. It detects and removes 65 honeypots by checking for zero-duration expert skills, calendar inconsistencies, and experience inflation. It retrieves the top candidates using SentenceTransformers (all-MiniLM-L6-v2) cosine similarity against the job description. The top 1,000 are re-scored using heuristic weights representing Series A founding team priorities: rewarding product backgrounds (+0.05), penalizing services-only backgrounds (-0.15), and weighting Noida/Pune local residency (+0.1) or relocation (+0.05), quick notice periods <= 30 days (+0.05), career stability (+0.05), and relevant platform assessments (+0.05). Scores are calibrated to be strictly monotonic, and ties are resolved ascendingly by candidate ID.

